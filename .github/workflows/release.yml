name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL
        run: choco install sbcl --yes

      - name: Install SQLite
        run: choco install sqlite --yes

      - name: Install Quicklisp
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://beta.quicklisp.org/quicklisp.lisp" -OutFile "$env:TEMP\quicklisp.lisp"
          sbcl --load "$env:TEMP\quicklisp.lisp" `
               --eval "(quicklisp-quickstart:install)" `
               --eval "(quit)"

      - name: Build CL backend
        shell: cmd
        run: sbcl --script build.lisp

      - name: Bundle native DLLs
        shell: pwsh
        run: |
          # sqlite3.dll を dist-cl/ にコピー (chocolatey でインストールしたもの)
          $candidates = @(
            "C:\ProgramData\chocolatey\lib\SQLite\tools\sqlite3.dll",
            "C:\ProgramData\chocolatey\bin\sqlite3.dll"
          )
          $copied = $false
          foreach ($path in $candidates) {
            if (Test-Path $path) {
              Copy-Item $path dist-cl\sqlite3.dll -Force
              Write-Host "Copied sqlite3.dll from $path"
              $copied = $true
              break
            }
          }
          if (-not $copied) {
            # PATH から検索
            $found = Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "sqlite3.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName dist-cl\sqlite3.dll -Force
              Write-Host "Copied sqlite3.dll from $($found.FullName)"
            } else {
              Write-Error "sqlite3.dll not found"
              exit 1
            }
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Electron app
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}