name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version from git tag
        shell: bash
        run: bash scripts/set-version.sh "${GITHUB_REF_NAME#v}"

      - name: Install SBCL
        run: choco install sbcl --yes

      - name: Install SQLite
        run: choco install sqlite --yes

      - name: Install Quicklisp
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://beta.quicklisp.org/quicklisp.lisp" -OutFile "$env:TEMP\quicklisp.lisp"
          sbcl --load "$env:TEMP\quicklisp.lisp" `
               --eval "(quicklisp-quickstart:install)" `
               --eval "(quit)"

      - name: Build CL backend
        shell: cmd
        run: sbcl --script build.lisp

      - name: Bundle native DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-cl | Out-Null

          # ------------------------------------------------------------------
          # libsqlite3.dll
          # SBCLは cl-sqlite ロード時に "libsqlite3.dll" という名前を記録する。
          # choco install sqlite は "sqlite3.dll" という名前でインストールするため、
          # "libsqlite3.dll" という名前でコピーしないとSBCLが見つけられない。
          # ------------------------------------------------------------------
          $sqliteSource = $null
          foreach ($candidate in @(
            "C:\ProgramData\chocolatey\lib\SQLite\tools\sqlite3.dll",
            "C:\ProgramData\chocolatey\bin\sqlite3.dll"
          )) {
            if (Test-Path $candidate) { $sqliteSource = $candidate; break }
          }
          if (-not $sqliteSource) {
            $found = Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "sqlite3.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $sqliteSource = $found.FullName }
          }
          if ($sqliteSource) {
            Copy-Item $sqliteSource "dist-cl\libsqlite3.dll" -Force
            Write-Host "Copied as libsqlite3.dll from: $sqliteSource"
          } else {
            Write-Error "sqlite3.dll not found"; exit 1
          }

          # ------------------------------------------------------------------
          # OpenSSL DLLs (hunchentoot/cl+ssl の依存)
          # SBCL が記録するDLL名に合わせてコピーする。
          # windows-latest では Git for Windows (mingw64) にlibssl/libcryptoがある。
          # ------------------------------------------------------------------
          $opensslRoots = @(
            "C:\Program Files\Git\mingw64\bin",
            "C:\Program Files\Git\usr\bin",
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\OpenSSL\bin"
          )
          foreach ($pattern in @("libssl*.dll", "libcrypto*.dll")) {
            $copied = $false
            foreach ($root in $opensslRoots) {
              $found = Get-ChildItem $root -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName "dist-cl\$($found.Name)" -Force
                Write-Host "Copied $($found.Name) from: $($found.FullName)"
                $copied = $true; break
              }
            }
            if (-not $copied) { Write-Warning "Not found: $pattern" }
          }

          Write-Host "`ndist-cl contents:"
          Get-ChildItem dist-cl | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Electron app
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}