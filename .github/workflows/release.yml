name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL
        run: choco install sbcl --yes

      - name: Install SQLite
        run: choco install sqlite --yes

      - name: Install Quicklisp
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://beta.quicklisp.org/quicklisp.lisp" -OutFile "$env:TEMP\quicklisp.lisp"
          sbcl --load "$env:TEMP\quicklisp.lisp" `
               --eval "(quicklisp-quickstart:install)" `
               --eval "(quit)"

      - name: Build CL backend
        shell: cmd
        run: sbcl --script build.lisp

      - name: Bundle native DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-cl | Out-Null

          function Copy-Dll($name, $searchRoots) {
            foreach ($root in $searchRoots) {
              $found = Get-ChildItem $root -Recurse -Filter $name -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName "dist-cl\$name" -Force
                Write-Host "Copied $name from $($found.FullName)"
                return $true
              }
            }
            Write-Warning "$name not found in search roots"
            return $false
          }

          # sqlite3.dll
          Copy-Dll "sqlite3.dll" @(
            "C:\ProgramData\chocolatey"
          ) | Out-Null

          # OpenSSL DLLs (hunchentoot/cl+ssl の依存)
          # windows-latest では Git for Windows の mingw64/bin に存在する
          $opensslRoots = @(
            "C:\Program Files\Git\mingw64\bin",
            "C:\Program Files\Git\usr\bin",
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\OpenSSL\bin",
            "C:\Windows\System32"
          )
          # libssl / libcrypto (バージョン名が異なる場合があるため複数パターンを試行)
          foreach ($pattern in @("libssl*.dll", "libcrypto*.dll")) {
            foreach ($root in $opensslRoots) {
              $found = Get-ChildItem $root -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName "dist-cl\$($found.Name)" -Force
                Write-Host "Copied $($found.Name) from $($found.FullName)"
                break
              }
            }
          }

          Write-Host "dist-cl contents:"
          Get-ChildItem dist-cl | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Electron app
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}